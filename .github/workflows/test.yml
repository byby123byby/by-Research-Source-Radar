name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: python -m compileall -q scripts
      - name: Run unit, adversarial, completeness, contract, and installer tests
        run: python -m unittest discover -s scripts -p "test_*.py"
      - name: Prove two unchanged core audit rounds converge
        run: |
          python scripts/audit_release.py
          python scripts/audit_release.py
          python -c "import json; assert json.load(open('AUDIT_MANIFEST.json', encoding='utf-8'))['result'] == 'PASS_CONVERGED'"
